name: Bug report
description: Report a reproducible EchoMind problem using synthetic data only.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not upload real chats, API keys, `.env` files, real databases, Profiles, or identity information. Use the smallest synthetic example possible. Follow SECURITY.md for vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What went wrong, and which part of EchoMind was affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide deterministic steps and synthetic inputs only.
      placeholder: |
        1. Start...
        2. Import synthetic...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.x or not applicable
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 24.x or not applicable
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EchoMind version
      placeholder: 0.1.0 or commit hash
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Include only minimal logs after removing chat content, paths, keys, database URLs, prompts, responses, and identity data.
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I used synthetic data and did not include real chats, API keys, `.env` files, real databases, or private identity data.
          required: true
        - label: This report does not contain confidential vulnerability details that belong in a private security report.
          required: true
